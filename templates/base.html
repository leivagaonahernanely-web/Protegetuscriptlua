<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuauProtect Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0A0E17',
                        sidebar: '#10141D',
                        card: '#151A25',
                        border: '#222834',
                        primary: '#5865F2',
                        textMuted: '#949BA4'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-dark text-gray-100 min-h-screen">
<div class="flex h-screen">
    <aside class="w-64 bg-sidebar border-r border-border p-4 flex flex-col justify-between">
        <div>
            <div class="text-2xl font-bold text-center mb-8 text-primary">🛡️ LuauProtect</div>
            <nav class="space-y-1">
                <a href="/" class="flex items-center gap-3 p-2.5 rounded {% if request.path == '/' %}bg-primary/20 text-primary{% else %}hover:bg-card{% endif %}">
                    <i class="fa fa-home w-5"></i> Dashboard
                </a>
                <a href="/scripts" class="flex items-center gap-3 p-2.5 rounded {% if '/scripts' in request.path %}bg-primary/20 text-primary{% else %}hover:bg-card{% endif %}">
                    <i class="fa fa-code w-5"></i> Scripts
                </a>
                <a href="/panels" class="flex items-center gap-3 p-2.5 rounded {% if '/panels' in request.path %}bg-primary/20 text-primary{% else %}hover:bg-card{% endif %}">
                    <i class="fa fa-layer-group w-5"></i> Panels
                </a>
                <a href="/keys" class="flex items-center gap-3 p-2.5 rounded {% if '/keys' in request.path %}bg-primary/20 text-primary{% else %}hover:bg-card{% endif %}">
                    <i class="fa fa-key w-5"></i> Keys
                </a>
                <a href="/hwid-bans" class="flex items-center gap-3 p-2.5 rounded {% if '/hwid-bans' in request.path %}bg-primary/20 text-primary{% else %}hover:bg-card{% endif %}">
                    <i class="fa fa-ban w-5"></i> HWID Bans
                </a>
            </nav>
        </div>
        <div class="border-t border-border pt-4 mt-6">
            <p class="text-sm font-medium">{{ user.username }}</p>
            <a href="/logout" class="text-red-400 text-sm mt-1 inline-block">Cerrar sesión</a>
        </div>
    </aside>
    <main class="flex-1 p-6 overflow-auto">
        {% block content %}{% endblock %}
    </main>
</div>
</body>
</html>
