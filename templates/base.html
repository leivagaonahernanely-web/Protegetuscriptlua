<<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protector de Scripts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0A0A0F',
                        card: '#12121A',
                        primary: '#4F46E5',
                        secondary: '#1E1E2B',
                        accent: '#6366F1',
                        textGray: '#B0B0C0'
                    },
                    fontFamily: {
                        inter: ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-dark text-white font-inter min-h-screen">
    <!-- Barra superior -->
    <header class="bg-card border-b border-secondary/50 px-6 py-4 flex justify-between items-center sticky top-0 z-10">
        <h1 class="text-xl font-bold flex items-center gap-2">
            <i class="fa-solid fa-shield text-primary"></i>
            Protector de Scripts
        </h1>
        <div class="flex items-center gap-4">
            <span class="text-sm text-textGray">👤 {{ user.username }}</span>
            <a href="/logout" class="text-red-400 hover:text-red-300 transition-colors">
                <i class="fa-solid fa-right-from-bracket"></i> Salir
            </a>
        </div>
    </header>

    <div class="flex flex-col md:flex-row">
        <!-- Menú lateral -->
        <aside class="bg-card border-r border-secondary/50 w-full md:w-64 p-4">
            <nav class="space-y-1">
                <a href="/" class="flex items-center gap-3 px-4 py-3 rounded-lg {% if request.path == '/' %}bg-primary/20 text-primary{% else %}hover:bg-secondary/50{% endif %} transition-all">
                    <i class="fa-solid fa-folder-open w-5"></i>
                    <span>Gestión de Scripts</span>
                </a>
                <a href="/panels" class="flex items-center gap-3 px-4 py-3 rounded-lg {% if request.path == '/panels' %}bg-primary/20 text-primary{% else %}hover:bg-secondary/50{% endif %} transition-all">
                    <i class="fa-solid fa-layer-group w-5"></i>
                    <span>Paneles</span>
                </a>
                <a href="/keys" class="flex items-center gap-3 px-4 py-3 rounded-lg {% if request.path == '/keys' %}bg-primary/20 text-primary{% else %}hover:bg-secondary/50{% endif %} transition-all">
                    <i class="fa-solid fa-key w-5"></i>
                    <span>Claves</span>
                </a>
                <a href="/hwid-bans" class="flex items-center gap-3 px-4 py-3 rounded-lg {% if request.path == '/hwid-bans' %}bg-primary/20 text-primary{% else %}hover:bg-secondary/50{% endif %} transition-all">
                    <i class="fa-solid fa-ban w-5"></i>
                    <span>HWID Baneados</span>
                </a>
            </nav>
        </aside>

        <!-- Contenido principal -->
        <main class="flex-1 p-6">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
