{% extends "base.html" %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">🚫 HWID Bans</h1>

<div class="bg-card p-5 rounded-xl border border-border mb-6">
    <h3 class="font-semibold mb-3">Bloquear HWID</h3>
    <div class="space-y-4">
        <input type="text" id="hwidInput" placeholder="HWID o hash" class="w-full bg-dark border border-border rounded p-2.5">
        <input type="text" id="reasonInput" placeholder="Motivo (opcional)" class="w-full bg-dark border border-border rounded p-2.5">
        <button onclick="banHWID()" class="w-full bg-red-600 hover:bg-red-700 p-2.5 rounded">Bloquear HWID</button>
    </div>
</div>

{% if bans %}
<div class="bg-card p-4 rounded-xl border border-border overflow-x-auto">
    <table class="w-full text-left">
        <thead>
            <tr class="border-b border-border">
                <th class="p-2">Hash HWID</th>
                <th class="p-2">Motivo</th>
            </tr>
        </thead>
        <tbody>
            {% for b in bans %}
            <tr class="border-b border-border">
                <td class="p-2 font-mono text-xs">{{ b.hwid_hash }}</td>
                <td class="p-2">{{ b.reason }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% else %}
<p class="text-center text-textMuted py-10">No hay HWID bloqueados</p>
{% endif %}

<script>
async function banHWID() {
    const hwid = document.getElementById('hwidInput').value.trim();
    const motivo = document.getElementById('reasonInput').value.trim();
    if (!hwid) return alert('Ingresa el HWID');
    const res = await fetch('/api/ban-hwid', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({hwid: hwid, reason: motivo})
    });
    const data = await res.json();
    if (data.success) location.reload();
    else alert('Error: ' + data.error);
}
</script>
{% endblock %}
