{% extends "base.html" %}
{% block content %}
<div class="max-w-5xl mx-auto">
    <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
        <i class="fa-solid fa-upload"></i> Subir Nuevo Script
    </h2>

    <div class="bg-card p-6 rounded-xl border border-secondary/50 mb-8 shadow-lg">
        <div class="space-y-4">
            <div>
                <label class="block text-sm text-textGray mb-2">Nombre del script</label>
                <input type="text" id="scriptName" placeholder="Ej: Hydrax Hub v2" class="w-full bg-secondary border border-gray-700 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary/50 transition-all">
            </div>
            <div>
                <label class="block text-sm text-textGray mb-2">Código Lua</label>
                <textarea id="scriptContent" rows="12" placeholder="Pega aquí todo el código de tu script..." class="w-full bg-secondary border border-gray-700 rounded-lg px-4 py-3 font-mono text-sm focus:outline-none focus:ring-2 focus:ring-primary/50 transition-all"></textarea>
            </div>
            <button onclick="subirScript()" class="w-full md:w-auto bg-green-600 hover:bg-green-500 px-6 py-3 rounded-lg font-medium flex items-center justify-center gap-2 transition-all shadow-md">
                <i class="fa-solid fa-rocket"></i> Host Script
            </button>
        </div>
    </div>

    <h2 class="text-2xl font-bold mb-4 flex items-center gap-2">
        <i class="fa-solid fa-list"></i> Scripts Alojados
    </h2>

    <div class="bg-card rounded-xl border border-secondary/50 overflow-hidden shadow-lg">
        {% if scripts %}
        <div class="divide-y divide-secondary/50">
            {% for s in scripts %}
            <div class="p-4 hover:bg-secondary/30 transition-colors">
                <h3 class="font-semibold text-lg mb-1">{{ s.name }}</h3>
                <p class="text-textGray text-sm font-mono break-all">URL: https://{{ request.host }}/scripts/hosted/{{ s.file_hash }}.lua</p>
            </div>
            {% endfor %}
        </div>
        {% else %}
        <div class="p-8 text-center text-textGray">
            <i class="fa-solid fa-folder-open text-4xl mb-3 opacity-40"></i>
            <p>Aún no has subido ningún script</p>
        </div>
        {% endif %}
    </div>
</div>

<script>
function subirScript() {
    const nombre = document.getElementById('scriptName').value.trim();
    const codigo = document.getElementById('scriptContent').value.trim();
    if (!nombre || !codigo) return alert('⚠️ Completa todos los campos');
    fetch('/api/upload-script', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({name: nombre, content: codigo})
    })
    .then(r => r.json())
    .then(d => {
        if (d.success) {
            alert(`✅ Subido correctamente!\nURL: ${d.url}`);
            location.reload();
        } else alert('❌ Error al subir el script');
    });
}
</script>
{% endblock %}
