{% extends "base.html" %}
{% block content %}
<div class="mb-6">
    <h1 class="text-2xl font-bold">🔑 Claves</h1>
    <p class="text-textMuted">Genera y administra claves de acceso</p>
</div>
<form id="formKey" class="bg-card p-5 rounded-xl border border-border mb-6">
    <h3 class="font-semibold mb-3">Generar clave</h3>
    <div class="space-y-3">
        <select id="panel_id" class="w-full bg-dark border border-border rounded p-2">
            <option value="">Seleccionar panel</option>
            {% for p in panels %}
            <option value="{{ p.id }}">{{ p.title }}</option>
            {% endfor %}
        </select>
        <input type="number" id="hours" placeholder="Duración en horas (0 = sin vencimiento)" class="w-full bg-dark border border-border rounded p-2" value="24">
        <button type="submit" class="w-full bg-primary hover:bg-primary/90 p-2 rounded">Generar Clave</button>
    </div>
</form>
{% endblock %}
