{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-center min-h-screen px-4">
    <div class="bg-card p-8 rounded-xl border border-secondary/70 w-full max-w-md">
        <div class="text-center mb-6">
            <i class="fa-solid fa-shield text-4xl text-primary mb-2"></i>
            <h2 class="text-2xl font-bold">Luau Protect</h2>
            <p class="text-gray-400">Inicia sesión con tu ID de Discord</p>
        </div>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="mb-4 p-3 bg-red-500/20 border border-red-500/30 rounded text-red-300">
                    {% for cat, msg in messages %}{{ msg }}{% endfor %}
                </div>
            {% endif %}
        {% endwith %}
        <form method="POST" class="space-y-4">
            <input type="text" name="discord_id" placeholder="Tu ID de Discord" required class="w-full bg-secondary border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary/50">
            <button type="submit" class="w-full bg-primary hover:bg-primary/90 py-2 rounded-lg font-medium">Iniciar Sesión</button>
        </form>
    </div>
</div>
{% endblock %}
