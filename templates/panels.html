{% extends "base.html" %}
{% block content %}
<div class="container mx-auto px-4 py-8 max-w-6xl">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold">📋 Paneles</h2>
        <a href="/" class="bg-secondary px-4 py-2 rounded-lg">← Volver</a>
    </div>

    <div class="bg-card p-6 rounded-xl border border-secondary/70 mb-8">
        <h3 class="text-lg font-semibold mb-4">Crear Nuevo Panel</h3>
        <input type="text" id="panelTitle" placeholder="Nombre del panel" class="w-full bg-secondary border border-gray-700 rounded-lg px-4 py-2 mb-3">
        <textarea id="panelDesc" rows="3" placeholder="Descripción..." class="w-full bg-secondary border border-gray-700 rounded-lg px-4 py-2 mb-3"></textarea>
        <select id="panelScript" class="w-full bg-secondary border border-gray-700 rounded-lg px-4 py-2 mb-4">
            {% for s in scripts %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}
        </select>
        <button onclick="crearPanel()" class="bg-primary hover:bg-primary/90 px-5 py-2 rounded-lg">Crear Panel</button>
    </div>

    <div class="bg-card p-6 rounded-xl border border-secondary/70">
        <h3 class="text-lg font-semibold mb-4">Paneles Existentes</h3>
        {% if panels %}
        <div class="space-y-3">
            {% for p in panels %}
            <div class="bg-secondary/40 p-3 rounded-lg">
                <strong>{{ p.title }}</strong><br>
                <span class="text-sm text-gray-300">{{ p.description or 'Sin descripción' }}</span>
            </div>
            {% endfor %}
        </div>
        {% else %}
        <p class="text-gray-400">No hay paneles creados.</p>
        {% endif %}
    </div>
</div>

<script>
function crearPanel() {
    fetch('/api/create-panel', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            title: document.getElementById('panelTitle').value,
            description: document.getElementById('panelDesc').value,
            script_id: document.getElementById('panelScript').value
        })
    })
    .then(r => r.json())
    .then(d => { if (d.success) { alert('✅ Panel creado'); location.reload(); } });
}
</script>
{% endblock %}
