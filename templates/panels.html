{% extends "base.html" %}
{% block content %}
<div class="mb-6">
    <h1 class="text-2xl font-bold">📦 Paneles</h1>
    <p class="text-textMuted">Asigna scripts a tus paneles</p>
</div>
<form id="formPanel" class="bg-card p-5 rounded-xl border border-border mb-6">
    <h3 class="font-semibold mb-3">Crear nuevo panel</h3>
    <div class="space-y-3">
        <input type="text" id="title" placeholder="Nombre del panel" class="w-full bg-dark border border-border rounded p-2">
        <select id="script_id" class="w-full bg-dark border border-border rounded p-2">
            <option value="">Seleccionar script</option>
            {% for s in scripts %}
            <option value="{{ s.id }}">{{ s.name }}</option>
            {% endfor %}
        </select>
        <button type="submit" class="w-full bg-primary hover:bg-primary/90 p-2 rounded">Crear Panel</button>
    </div>
</form>
{% endblock %}
