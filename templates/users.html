{% extends "base.html" %}
{% block content %}
<div class="mb-6">
    <h1 class="text-2xl font-bold">👥 Usuarios</h1>
    <p class="text-textMuted">Administra todos los usuarios registrados</p>
</div>
<div class="bg-card p-4 rounded-xl border border-border overflow-x-auto">
    <table class="w-full text-left">
        <thead>
            <tr class="border-b border-border">
                <th class="p-2">ID Discord</th>
                <th class="p-2">Nombre</th>
                <th class="p-2">Rol</th>
            </tr>
        </thead>
        <tbody>
            {% for u in usuarios %}
            <tr class="border-b border-border">
                <td class="p-2 font-mono text-xs">{{ u.discord_id }}</td>
                <td class="p-2">{{ u.discord_username }}</td>
                <td class="p-2">{{ 'Administrador' if u.is_admin else 'Usuario' }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
